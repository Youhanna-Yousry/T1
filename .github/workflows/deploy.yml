name: Deploy Application to DigitalOcean

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Set up OpenJDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build Spring Boot Backend
        working-directory: ./backend
        run: mvn clean package -DskipTests

      - name: Set up Node.js 24
        uses: actions/setup-node@v6.2.0
        with:
          node-version: '24'

      - name: Build React Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Copy Backend JAR to Droplet
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/target/t1.jar"
          target: "/opt/t1/"
          strip_components: 2

      - name: Copy React Build to Droplet (Nginx)
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/build/"
          target: "/var/www/t1/"
          strip_components: 2

      - name: Execute SSH Commands to Restart Services
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo systemctl restart t1-backend

            sudo systemctl restart nginx